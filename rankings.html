<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Flying Aces Rankings</title>

<style>
:root{
  --btn-angle: 135deg;

  --red1:#ff3b3b;
  --red2:#e40000;

  --blue1:#3a86ff;
  --blue2:#0d6efd;

  /* NEW grey (matches “Singles” style vibe) */
  --gray1:#8a8f98;
  --gray2:#5f6670;
}

html, body {
    -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
font-family: "Segoe UI", Roboto, Arial, sans-serif;
  background: #f7f8fa;
  margin: 0;
  padding: 4px;
  color: #222;
  overflow-x: hidden;
  font-size: 11px !important;
}

.container { width: 100%; margin: 0 auto; }

.top-panel{
  background:#fff !important;
  border-radius:18px !important;
  box-shadow:0 10px 30px rgba(0,0,0,.08) !important;
  padding:14px !important;
  margin:12px 0 8px !important;
  overflow:visible !important;
}

.aces-header { display: none !important; }
.control-content { padding: 6px 0 !important; }

.input-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px !important;
}

.input-group label{
  display:flex;
  align-items:center;
  justify-content:center;
  height: 24px !important;
  font-size: 0.95em !important;
  font-weight: 900 !important;
  border-radius: 8px;
  margin-bottom: 4px !important;
}

select{
  width: 100%;
  height: 28px !important;
  line-height: 28px !important;
  box-sizing: border-box;

  font-size: 16px !important;
  font-weight: 900 !important;
  color: #333 !important;
  -webkit-text-fill-color: #333 !important;

  text-align: center !important;
  text-align-last: center;

  border: 1.5px solid #d9d9d9 !important;
  border-radius: 8px !important;
  background-color: #fff !important;

  background-image: url("data:image/svg+xml;utf8,\
    <svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24'>\
      <path fill='%23666' d='M7 10l5 5 5-5z'/>\
    </svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 16px 16px;

  -webkit-appearance: none;
  appearance: none;

  padding: 0 28px 0 28px !important; /* ✅ symmetric */
}
select option{ text-align:center; }

.input-group:nth-child(1) label,
.input-group:nth-child(2) label,
.input-group:nth-child(3) label,
.input-group:nth-child(4) label {
  background: linear-gradient(var(--btn-angle),#000 0%, #000 100%) !important;
  color: #fff !important;
}
.color-bar { display:none !important; }

#total-warning {
  grid-column: 1 / -1;
  font-size: 0.95em !important;
  padding: 8px 0 !important;
  color: #dc3545;
  font-weight: bold;
  display: none;
  text-align: center;
}

.table-panel {
  background: #fff;
  border-radius: 10px;
  border-top: none !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 1.05em !important;
}

.table-panel thead th{
  background: #f0f0f0 !important;
  cursor: pointer;
  user-select: none;
  padding: 4px 6px !important;
  line-height: 1.02 !important;
  font-weight: 600 !important;
  font-size: 0.85em !important;
  color: #333 !important;
  text-transform: none !important;
  border-bottom: 1px solid #eee !important;
  vertical-align: top !important;
}
th::after, th.sort-desc::after, th.sort-asc::after { content: none !important; }

td {
  padding: 3.25px 2px !important;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  font-size: 1.05em !important;
}
#table-body tr:nth-child(even) td { background: rgba(0,0,0,0.03) !important; }

th:nth-child(1), td:nth-child(1) { width: 8% !important; }
th:nth-child(2), td:nth-child(2) {
  width: 27% !important;
  text-align: left !important;
  padding-left: 5px !important;
  white-space: nowrap !important;
  overflow: hidden !important;
  text-overflow: ellipsis !important;
}
th:nth-child(7), td:nth-child(7) { width: 10% !important; }

#table-body td.rank-cell { position: relative; padding-left: 12px !important; }
#table-body td.rank-cell::before{
  content: "";
  position: absolute;
  left: 2px;
  top: 4px;
  bottom: 4px;
  width: 3px;
  border-radius: 3px;
  background: #d1d5db;
}
#table-body tr.q-top    td.rank-cell::before { background: #28a745; }
#table-body tr.q-high   td.rank-cell::before { background: #0d6efd; }
#table-body tr.q-mid    td.rank-cell::before { background: #f0ad00; }
#table-body tr.q-bottom td.rank-cell::before { background: #dc3545; }

.player-name { font-weight: 400 !important; font-size: 1.10em !important; }
.score-cell  { font-weight: 900; color: #000; }

.chart-panel { display: none !important; }

/* ===== Bottom controls (compact) ===== */
.bottom-controls{
  margin-top: 8px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.bottom-controls button{
  border: none;
  border-radius: 10px;
  padding: 16px 6px;
  font-size: 1.10em;
  font-weight: 900;
  cursor: pointer;
  color: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.10);
  transition: transform .08s ease, filter .15s ease, opacity .15s ease, box-shadow .15s ease;
  -webkit-tap-highlight-color: transparent;
}
.bottom-controls button:hover{
  box-shadow: 0 1px 6px rgba(0,0,0,.18);
  filter: brightness(1.06);
}
.bottom-controls button:active{
  transform: scale(0.99);
  filter: brightness(1.03);
}
.bottom-controls button:disabled{
  opacity: .6;
  cursor: not-allowed;
  filter: none;
}
#rerankBtn{ background: linear-gradient(var(--btn-angle), var(--red1) 0%, var(--red2) 100%) !important; }
#resetMenuBtn{ background: linear-gradient(var(--btn-angle), var(--blue1) 0%, var(--blue2) 100%) !important; }
/* legacy ids (safe to keep) */
#applyBtn{ background: linear-gradient(var(--btn-angle), var(--red1) 0%, var(--red2) 100%); }
#resetBtn{ background: linear-gradient(var(--btn-angle), var(--gray1) 0%, var(--gray2) 100%); }

/* ✅ Loading overlay */
#loadingOverlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000;
  visibility: hidden;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease, visibility .2s ease;
}
#loadingOverlay.active{
  visibility: visible;
  opacity: 1;
  pointer-events: auto;
}
.loadingPulse{
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #0d6efd;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse{
  0%{transform:scale(1);opacity:.9}
  50%{transform:scale(1.08);opacity:1}
  100%{transform:scale(1);opacity:.9}
}

/* ===== Big dialog select fix (mobile) ===== */
#overlay_big_dialog select{
  font-size: 16px !important;
  line-height: 1.15 !important;
  height: 54px !important;
  padding: 10px 44px 10px 16px !important;
  text-align: center !important;
  text-align-last: center;
}
@media (max-width: 420px){
  #overlay_big_dialog select{ font-size: 1.0em !important; }
}

@media (max-width: 430px){
  body{ font-size: 11px !important; }
  .input-grid{ gap: 5px !important; }
  label{ height: 32px !important; }
  select{ height: 32px !important; }
}



/* =========================================================
   Consistent page header (matches red “active” pages)
   ========================================================= */
.panel{
  background:#fff;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  padding:14px;
  margin:12px 0;
}
.panel-titlebar{
  display:flex;
  align-items:center;
  justify-content:center;

  /* span edge-to-edge inside .panel (which has padding:14px) */
  margin:-14px -14px 10px;

  /* ✅ 32px tall */
  height:32px;
  padding:0 14px;
  box-sizing:border-box;

  text-transform:uppercase;
  font-weight:950;
  font-size:14px;
  letter-spacing:.02em;
  user-select:none;

  color:#fff;
  background: linear-gradient(var(--btn-angle), var(--red1) 0%, var(--red2) 100%);
  border-radius:18px 18px 0 0;
}


/* =========================
   Clickable player names + player modal (imported from Stats.html)
   ========================= */

/* clickable player names (same as Stats) */
a.playerLink{ color:#111; text-decoration:none; font-weight:inherit; }
a.playerLink:hover{ text-decoration:underline; }

/* small/muted helpers used in the modal */
.small{ font-size: 12px; color:#667085; font-weight:700; }
.muted{ color:#667085; font-weight:700; }

.modal{
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.55);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 2000;
  padding: 12px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
}
.modal.show{ display:flex; }
.modal-card{
  width: min(640px, 100%);
  max-height: calc(100vh - 24px);
  overflow: auto;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,.35);
  padding: 14px;
}
/* sheet-style modal: fill height with equal top/bottom inset */
:root{ --modal-inset: 12px; }
.modal.modal-sheet{
  align-items: stretch;
  padding: calc(var(--modal-inset) + env(safe-area-inset-top)) var(--modal-inset) calc(var(--modal-inset) + env(safe-area-inset-bottom));
}
.modal.modal-sheet .modal-card{
  height: 100%;
  max-height: none;
  overflow: hidden;
  display:flex;
  flex-direction:column;
}
.modal.modal-sheet .modal-body{
  flex:1;
  max-height:none !important;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}
.modal-head .title{ font-weight:950; font-size:15px; }
.icon-btn{
  -webkit-appearance:none;
  appearance:none;
  border:0;
  padding:0;
  cursor:pointer;
  color:#fff;
  width:42px;
  height:42px;
  border-radius:14px;
  background: linear-gradient(var(--btn-angle), #9aa3af, #6b7280);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 22px rgba(0,0,0,.12);
  user-select:none;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active{ transform: translateY(1px); }
.icon-btn span{ font-size:18px; line-height:1; }

.form-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
@media (max-width: 740px){ .form-grid{ grid-template-columns: 1fr; } }
.field label{
  display:block;
  font-size:11px;
  font-weight:900;
  letter-spacing:.02em;
  color:#3a3f46;
  margin:2px 0 6px;
}
.field select, .field input{
  width:100%;
  box-sizing:border-box;
  border-radius:12px;
  border:1px solid #e6e8ee;
  padding:10px 12px;
  font-size:13px;
  outline:none;
  background:#fff;
}

.btn-row{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
@media (max-width: 740px){ .btn-row{ grid-template-columns: 1fr; } }

/* hide some columns on narrow screens (tables only) */
@media (max-width: 520px){
  thead th{ padding:9px 8px; }
  tbody td{ padding:9px 8px; font-size:12px; }
/* MEN/WOMEN roster tables: make Rating/Elo tighter so Name gets more width */
@media (max-width: 520px){

  /* Rating column */
  #menRoster  table.stats th:nth-child(2),
  #menRoster  table.stats td:nth-child(2),
  #womenRoster table.stats th:nth-child(2),
  #womenRoster table.stats td:nth-child(2){
    width: 72px;
    min-width: 72px;
    padding-left: 6px;
    padding-right: 6px;
  }

  /* Elo column */
  #menRoster  table.stats th:nth-child(3),
  #menRoster  table.stats td:nth-child(3),
  #womenRoster table.stats th:nth-child(3),
  #womenRoster table.stats td:nth-child(3){
    width: 64px;
    min-width: 64px;
    padding-left: 6px;
    padding-right: 6px;
  }

  /* OPTIONAL: if you prefer wrap instead of ellipsis */
  /*
  #menRoster  table.stats td:first-child,
  #womenRoster table.stats td:first-child{
    white-space: normal;
    line-height: 1.15;
  }
  */
}}

/* =========================================================
   Collapsible panels (CENTERED + ALL CAPS like your "good" version)
   ========================================================= */
details.collapsible{ padding:0; }
details.collapsible > summary{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px 14px;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color: transparent;
  font-weight:950;
  font-size:14px;
  letter-spacing:.02em;
  text-transform:uppercase;
  position:relative;
  list-style:none;
}
details.collapsible > summary::-webkit-details-marker{ display:none; }
details.collapsible .collap-chevron{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%) rotate(0deg);
  transition: transform 180ms ease;
  font-size:18px;
  color:#667085;
}
details.collapsible[open] .collap-chevron{ transform: translateY(-50%) rotate(180deg); }
details.collapsible .collap-body{ padding:0 14px 14px; }

/* partner table: more row height + stacked names */
.pair-table tbody td{ padding-top:14px; padding-bottom:14px; }
.stack{ white-space:normal !important; line-height:1.15; }

/* 
=========================================================
   Compact match rows (NOT bold names; score colored by result)
   ========================================================= */
.match-card{
  background:#fff;
  border:1px solid #eef2f7;
  border-radius:16px;
  padding:8px 10px;
  display:grid;
  grid-template-columns: 1fr 96px 1fr;
  gap:8px;
  align-items:center;

  font-weight: 400; /* ✅ not bold overall */
}

/* outcome borders: left team vs right team */
.match-card.score-win{
  box-shadow: inset 6px 0 0 rgba(21,128,61,.22), inset -6px 0 0 rgba(185,28,28,.18);
}
.match-card.score-loss{
  box-shadow: inset 6px 0 0 rgba(185,28,28,.18), inset -6px 0 0 rgba(21,128,61,.22);
}
.match-card.score-tie{
  box-shadow: inset 6px 0 0 rgba(161,98,7,.18), inset -6px 0 0 rgba(161,98,7,.18);
}

/* center stack inside match-card (date over score + optional Elo delta) */
.mc-mid{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-width:0;
  text-align:center;
}
.mc-date{
  font-size:10px;
  color:#667085;
  font-weight:950;
  letter-spacing:.02em;
  white-space:nowrap;
}
.mc-delta{ font-size:11px; font-weight:950; line-height:1; min-height:12px; }
.mc-delta:empty{ opacity:0; }

.delta{ font-variant-numeric:tabular-nums; font-weight:950; }
.delta.pos{ color:#15803d; }
.delta.neg{ color:#b91c1c; }

/* Score pill gets subtle background like ELO page */
.mc-score.score-win{ background:#ecfdf3; color:#15803d; border:1px solid #bbf7d0; }
.mc-score.score-loss{ background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; }
.mc-score.score-tie{ background:#f8fafc; color:#334155; border:1px solid #e2e8f0; }

/* Elo number pill under player name (number only, no 'Elo' label) */
.elo-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:3px 10px;
  border-radius:999px;
  border:1px solid #e7edf5;
  background:#f8fafc;
  color:#475569;
  font-size:11px;
  font-weight:900;
  margin-top:0;
}

.match-card + .match-card{ margin-top:10px; }

.mc-side-team{
  font-size:10px;
  font-weight:950;
  color:#667085;
  margin-bottom:4px;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:.06em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* Player blocks: name on top, rank+elo pills under (centered) */
.mc-person{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  margin:4px 0;
}
.mc-person-name{
  font-weight:700;
  line-height:1.12;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.mc-person-name a{ font-weight:700; }
.mc-person-pills{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
}
.eloMini{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:3px 10px;
  border-radius:999px;
  border:1px solid #e7edf5;
  background:#f8fafc;
  color:#475569;
  font-size:11px;
  font-weight:900;
}

.mc-left, .mc-right{
  min-width:0;
  font-weight: inherit; /* keep names non-bold */
}
.mc-left{ text-align:center; }
.mc-right{ text-align:center; }

.mc-left .mc-side-team{ text-align:center; }
.mc-right .mc-side-team{ text-align:center; }

.mc-name{
  line-height:1.12;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  min-width:0;
}
.mc-right .mc-name{ justify-content:center; }
.mc-left .mc-name{ justify-content:center; }

.mc-name .nm{ min-width:0; overflow:hidden; text-overflow:ellipsis; }
.mc-name a{ min-width:0; overflow:hidden; text-overflow:ellipsis; }
/* 3-col layout tweak: each side is centered and uses Team / (Rank+Elo) / Name */
.mc-player{

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  margin-top:0;
}
.mc-player + .mc-player{ margin-top:10px; }
.mc-pills{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.mc-player-name{
  line-height:1.12;
  min-width:0;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.mc-player-name a{
  color:inherit;
  text-decoration:none;
}
.mc-player-name a:hover{ text-decoration:underline; }

.elo-pill{ flex:0 0 auto; }
.mc-mid{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-weight: 700; /* small center labels a bit stronger */
}
.mc-vs{
  font-size:11px;
  color:#667085;
  line-height:1;
  font-weight: 700;
}
.mc-mid-team{
  font-size:10px;
  font-weight:950;
  color:#667085;
  margin-bottom:3px;
  text-align:center;
  max-width:92px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.mc-score{
  font-weight:900;
  text-align:center;
  border-radius:12px;
  padding:4px 6px;
  min-width:68px;
  border:1px solid #eef2f7;
  background:#f8fafc;
  line-height:1;
}
.mc-score-stroke{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:15px;
}
.mc-score-mp{ font-size:14px; line-height:1; }
.score-win{ color:#15803d; }
.score-loss{ color:#b91c1c; }
.score-tie{ color:#a16207; }

/* =========================================================
   Rank pills (A/B/C/D + women AF/BF/CF)
   - Aces pill on LEFT; Opp pill on RIGHT
   ========================================================= */
.rank-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:0px;
  padding:1px 4px;
  border-radius:900px;
  font-weight:1000;
  font-size:10px;
  line-height:1;
  border:1px solid transparent;
}
.rank-left{ margin-right:6px; }
.rank-right{ margin-left:6px; }

/* Rank colors: A=green, B=blue, C=yellow, D=red; Women AF/BF/CF */
.rank-A, .rank-AF{
  background:#e8f7ee;
  border-color:#bbf7d0;
  color:#15803d;
}
.rank-B, .rank-BF{
  background:#e8f1ff;
  border-color:#bfdbfe;
  color:#1d4ed8;
}
.rank-C, .rank-CF{
  background:#fff7dd;
  border-color:#fde68a;
  color:#a16207;
}
.rank-D{
  background:#ffe6e6;
  border-color:#fecaca;
  color:#b91c1c;
}

@media (max-width: 520px){
  .match-card{ grid-template-columns: 1fr 88px 1fr; padding:9px; }
  .mc-score{ min-width:62px; padding:6px 7px; }
  .mc-score-stroke{ font-size:14px; gap:5px; }
}

</style>
</head>

<style>
:root{ --fa-header-offset: 0px; }

/* Header container */
.fa-header{
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #f7f8fa;
  border-bottom: none;
  padding: 0 !important;
  box-sizing: border-box;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* ✅ Help block pinch/zoom gestures inside iframe (browser-dependent) */
html, body { touch-action: pan-x pan-y; }

/* ============ TOP TABS (4) ============ */
.fa-header .fa-tabs{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px !important;
  padding: 8px 0 !important;
  margin: 0 !important;
  border: none !important;
  background: transparent !important;
  border-radius: 0 !important;
}

/* Shared button base for top tabs + submenu buttons */
.fa-header .fa-tabs button,
.fa-header .fa-submenu button{
  -webkit-appearance:none !important;
  appearance:none !important;

  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:100% !important;
  box-sizing:border-box !important;

  font-family:"Segoe UI", Roboto, Arial, sans-serif !important;
  font-weight:900 !important;
  font-size: clamp(12px, 3.6vw, 16px) !important;
  letter-spacing: .2px !important;
  line-height: 1 !important;

  height: 40px !important;
  min-height: 40px !important;
  padding: 0 6px !important;

  border-radius: 8px !important;
  border: 0 !important;
  outline: none !important;

  background: linear-gradient(180deg, #f9f9f9 0%, #ededed 100%) !important;
  box-shadow: 0 1px 4px rgba(0,0,0,.10) !important;

  color: #222 !important;
  cursor: pointer !important;

  transition: background .18s ease, color .18s ease, box-shadow .18s ease, transform .08s ease, filter .12s ease !important;

  white-space: nowrap !important;
  overflow: hidden !important;
  text-overflow: ellipsis !important;

  -webkit-tap-highlight-color: transparent !important;
  user-select: none !important;
}

.fa-header .fa-tabs button:not(.active):hover,
.fa-header .fa-submenu button:not(.sub-active):hover{
  background: linear-gradient(180deg, #f1f1f1 0%, #e3e7f0 100%) !important;
}

/* Active tab */
.fa-header .fa-tabs button.active{
  background: linear-gradient(135deg,#ff3b3b 0%, #e40000 100%) !important;
  color: #ffffff !important;
  box-shadow: 0 1px 6px rgba(228,0,0,.22) !important;
  filter: brightness(1.06);
}

/* Tap flash */
.fa-header .fa-tabs button.fa-press,
.fa-header .fa-submenu button.fa-press{
  background: linear-gradient(135deg,#ff3b3b 0%, #e40000 100%) !important;
  color: #ffffff !important;
  box-shadow: 0 1px 6px rgba(228,0,0,.22) !important;
  filter: brightness(1.06);
}

.fa-header .fa-tabs button:active,
.fa-header .fa-submenu button:active{
  transform: scale(0.99);
}

/* ======= Hamburger button + logo ======= */
#nav-menu{
  padding: 0 10px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 10px !important;
}

#nav-menu .menu-logo{
  height: 18px;
  width: auto;
  display: block;
}

#nav-menu .hamburger-icon{
  width: 24px;
  height: 24px;
  flex: 0 0 auto;
}
#nav-menu .hamburger-icon{
  width: 24px;
  height: 24px;
  flex: 0 0 auto;
}

/* ============ DROPDOWN MENU (hamburger) ============ */
.fa-submenu-wrap{ position: relative; }

.fa-submenu{
  position: absolute;
  top: 100%;
  left: 0;
  padding: 8px 0 0;
  z-index: 1001;

  opacity: 0;
  transform: translateY(-6px);
  visibility: hidden;
  pointer-events: none;
  transition: opacity 140ms ease, transform 140ms ease, visibility 0s linear 140ms;
}
.fa-submenu.show{
  opacity: 1;
  transform: translateY(0);
  visibility: visible;
  pointer-events: auto;
  transition: opacity 140ms ease, transform 140ms ease;
}

.fa-submenu .inner{
  background: rgba(255,255,255,.98);
  border: 1px solid rgba(0,0,0,.12);
  box-shadow: 0 12px 26px rgba(0,0,0,.16);
  border-radius: 14px;
  overflow: hidden;
  padding: 8px;

  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;

  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
}

/* Slightly taller menu rows feels more “iOS” without changing your top tabs */
.fa-header .fa-submenu button{
  height: 42px !important;
  min-height: 42px !important;
  font-size: 13px !important;
  border-radius: 12px !important;
}

.fa-header .fa-submenu button.sub-active{
  background: linear-gradient(135deg,#ff3b3b 0%, #e40000 100%) !important;
  color:#fff !important;
  box-shadow: 0 1px 6px rgba(228,0,0,.22) !important;
  filter: brightness(1.04);
}

}

<script>
/* ===========================
   0) Disable pinch/zoom inside iframe (iOS Safari fallback)
   =========================== */
(function(){
  ['gesturestart','gesturechange','gestureend'].forEach(function(evt){
    document.addEventListener(evt, function(e){ e.preventDefault(); }, { passive:false });
  });

  var lastTouchEnd = 0;

  function _faIsIOS_(){
    try{
      var ua = navigator.userAgent || "";
      var plat = navigator.platform || "";
      var isIPhoneIPadIPod = /iPad|iPhone|iPod/.test(ua);
      var isIPadOS = (plat === "MacIntel" && (navigator.maxTouchPoints || 0) > 1);
      return isIPhoneIPadIPod || isIPadOS;
    }catch(_){ return false; }
  }
  function _faIsInteractive_(t){
    try{
      return !!(t && t.closest && t.closest("button,a,input,select,textarea,label,[role='button'],[contenteditable='true']"));
    }catch(_){ return false; }
  }

  document.addEventListener('touchend', function(e){
    if (!_faIsIOS_()) return;
    if (_faIsInteractive_(e.target)) return;

    var now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive:false });
})();

/* ===========================
   1) Header nav + menu + active state
   =========================== */
(function(){
  function qs() {
    try { return new URLSearchParams(window.location.search || ""); }
    catch (e) { return new URLSearchParams(""); }
  }

  function currentPage(){
    var p = (qs().get("p") || qs().get("page") || "").toLowerCase();

    // Support hash routing (GitHub wrapper uses #scoring, #matchups, etc.)
    if (!p){
      var h = (window.location.hash || "").replace(/^#/, "").toLowerCase();
      h = h.replace(/^\/+/, "");
      if (h.indexOf("?") !== -1) h = h.split("?")[0];
      if (h.indexOf("&") !== -1) h = h.split("&")[0];
      p = h;
    }

    // Support clean-path routing (/rosters, /matchups, etc.)
    if (!p){
      var path = (window.location.pathname || "").toLowerCase();
      path = path.replace(/\/+$/, ""); // trim trailing slash
      if (path && path !== "/"){
        var seg = path.split("/").filter(Boolean).pop() || "";
        seg = seg.replace(/\.html$/, "");
        p = seg;
      }
    }

    if (!p) return "matchups";
    if (p === "doubles") p = "rosters";
    return p;
  }

  function isEmbedded(){
    try { if (window.top !== window) return true; } catch(e){ return true; }
    return false;
  }

  // Pages that live under the hamburger menu
  const menuPages = ['rankings','stats','standings','elo','admin','players'];

  function setActiveByPage(page){
    page = String(page||"").toLowerCase();

    // top tabs
    document.querySelectorAll(".fa-tabs button").forEach(function(b){
      var key = b.dataset.key || b.dataset.page || "";
      var active = false;
      if (key === "menu") active = (menuPages.indexOf(page) !== -1);
      else active = (b.dataset.page === page);
      b.classList.toggle("active", !!active);
    });

    // dropdown buttons
    var menu = document.getElementById("faMoreMenu");
    if (menu){
      menu.querySelectorAll("button[data-page]").forEach(function(btn){
        btn.classList.toggle("sub-active", (btn.dataset.page === page));
      });
    }
  }

  function detectActive(){
    try{
      var p = currentPage();
      if (menuPages.indexOf(p) !== -1 || ["scoring","rosters","matchups"].indexOf(p) !== -1){
        setActiveByPage(p);
        return;
      }
      
      // STATS title marker (helps when Stats page also contains roster/link sections)
      var titleBar = document.querySelector(".pageTitlePanel .panel-titlebar, .panel.pageTitlePanel .panel-titlebar, .panel-titlebar");
      if (titleBar && /stats/i.test((titleBar.textContent || "").trim())){
        setActiveByPage("stats");
        return;
      }

// ELO markers
      if (
        document.getElementById("kBase") ||
        document.getElementById("overallBody") ||
        document.getElementById("pairsBody") ||
        /(^|\s)elo(\s|$)/i.test(document.title || "")
      ){
        setActiveByPage("elo");
        return;
      }

      // DOM heuristics
      if (document.getElementById("singlesBody") || document.getElementById("recentCards")) { setActiveByPage("stats"); return; }
      if (document.getElementById("table-body")) { setActiveByPage("rankings"); return; }
      if (document.getElementById("b1") || document.getElementById("b2") || document.getElementById("b9")) { setActiveByPage("scoring"); return; }
      if (document.getElementById("panel-CURRENT")) { setActiveByPage("rosters"); return; }
      if (document.getElementById("playersTable") || document.getElementById("teamSelect")) { setActiveByPage("admin"); return; }
      if (document.getElementById("team1Table") || document.getElementById("team2Table")) { setActiveByPage("matchups"); return; }
      // Standings markers
      if (document.getElementById("matchResults") || document.getElementById("adjWrap") || document.getElementById("simMatchup")) { setActiveByPage("standings"); return; }

      // title fallback
      var t = (document.title || "").toLowerCase();
      if (t.indexOf("stat") !== -1) { setActiveByPage("stats"); return; }
      if (t.indexOf("ranking") !== -1) { setActiveByPage("rankings"); return; }
      if (t.indexOf("scor") !== -1) { setActiveByPage("scoring"); return; }
      if (t.indexOf("roster") !== -1 || t.indexOf("double") !== -1) { setActiveByPage("rosters"); return; }

      setActiveByPage("matchups");
    }catch(e){
      setActiveByPage("matchups");
    }
  }

  function extraQS(opts){
    opts = opts || {};
    var s = qs();
    var parts = [];
    // Only propagate embed=1 when actually inside an iframe
    if (opts.embed && isEmbedded()) parts.push("embed=1");
    var scale = s.get("scale");
    var v = s.get("v");
    if (scale) parts.push("scale=" + encodeURIComponent(scale));
    if (v) parts.push("v=" + encodeURIComponent(v));
    return parts.length ? ("?" + parts.join("&")) : "";
  }

  function buildHref(page){
    page = String(page||"").toLowerCase();
    if (!page) return "";
    if (isEmbedded()){
      var q = extraQS({ embed:true });
      if (q) q = q.replace(/^\?/, "&");
      return "?p=" + encodeURIComponent(page) + q;
    } else {
      return "/" + encodeURIComponent(page) + ".html" + extraQS({ embed:false });
    }
  }

  function maybeRedirectLegacyParams(){
    if (isEmbedded()) return;
    var s = qs();
    var p = (s.get("p") || s.get("page") || "").toLowerCase();
    if (!p) return;

    var target = "/" + encodeURIComponent(p) + ".html";
    var cur = (window.location.pathname || "").toLowerCase().replace(/\/+/g, "/");
    if (cur.endsWith("/")) cur = cur.slice(0, -1);
    if (cur === target.toLowerCase()) return;

    var q2 = extraQS({ embed:false });
    try{
      window.location.replace(q2 ? (target + q2) : target);
    }catch(e){
      window.location.href = q2 ? (target + q2) : target;
    }
  }

  

  function sendToWrapper(page){
    var msg = { type: "FA_NAV", page: page };
    var sent = false;
    try { window.top.postMessage(msg, "*"); sent = true; } catch(e){}
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(msg, "*");
        sent = true;
      }
    } catch(e){}
    return sent;
  }

  // ---- menu open/close ----
  var menuBtn  = document.getElementById("nav-menu");
  var menuEl   = document.getElementById("faMoreMenu");

  function setMenuAria(open){
    if (!menuBtn) return;
    menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
  }

  function positionMenu(){
    if (!menuEl || !menuBtn) return;
    var wrap = document.querySelector(".fa-submenu-wrap");
    if (!wrap) return;

    var wrapRect = wrap.getBoundingClientRect();
    var btnRect  = menuBtn.getBoundingClientRect();

    // Wider than the button for a “real site” menu feel
    var width = Math.max(btnRect.width + 12, 200);
    width = Math.min(width, Math.floor(wrapRect.width - 8));

    // Right-align under the hamburger (more typical)
    var left = (btnRect.right - wrapRect.left) - width;

    // Clamp within wrap bounds
    var maxLeft = Math.max(0, wrapRect.width - width);
    left = Math.max(0, Math.min(left, maxLeft));

    menuEl.style.left = left + "px";
    menuEl.style.right = "auto";
    menuEl.style.width = width + "px";
  }

  function openMenu(){
    if (!menuEl) return;
    positionMenu();
    menuEl.classList.add("show");
    menuEl.setAttribute("aria-hidden","false");
    setMenuAria(true);
  }

  function closeMenu(){
    if (!menuEl) return;
    menuEl.classList.remove("show");
    menuEl.setAttribute("aria-hidden","true");
    setMenuAria(false);
  }

  function toggleMenu(){
    if (!menuEl) return;
    if (menuEl.classList.contains("show")) closeMenu();
    else openMenu();
  }

  function navigate(page){
    page = String(page||"").toLowerCase();
    if (!page) return;

    closeMenu();

    // Active immediately so tap feels responsive
    setActiveByPage(page);

    var embedded = isEmbedded();
    if (embedded){
      var ok = sendToWrapper(page);
      if (!ok) window.location.href = buildHref(page);
    }else{
      window.location.href = buildHref(page);
    }
  }

  // Close on outside click
  document.addEventListener("click", function(e){
    if (!menuEl || !menuEl.classList.contains("show")) return;
    var t = e.target;
    if (t === menuBtn || (menuBtn && menuBtn.contains(t))) return;
    if (menuEl.contains(t)) return;
    closeMenu();
  }, true);

  // Keep menu anchored on resize/orientation changes
  window.addEventListener("resize", function(){
    if (menuEl && menuEl.classList.contains("show")) positionMenu();
  }, { passive:true });

  // ESC closes
  document.addEventListener("keydown", function(e){
    if (e.key === "Escape") closeMenu();
  });

  // Tap flash
  function flash(btn){
    if (!btn) return;
    btn.classList.add("fa-press");
    window.setTimeout(function(){ btn.classList.remove("fa-press"); }, 140);
  }
  function wireFlash(root){
    if (!root) return;
    root.querySelectorAll("button").forEach(function(btn){
      btn.addEventListener("touchstart", function(){ flash(btn); }, { passive:true });
      btn.addEventListener("mousedown",  function(){ flash(btn); }, { passive:true });
    });
  }
  wireFlash(document.querySelector(".fa-tabs"));
  wireFlash(menuEl);

  // Wire top tabs
  document.querySelectorAll(".fa-tabs button").forEach(function(btn){
    btn.addEventListener("click", function(){
      if (btn.id === "nav-menu"){ toggleMenu(); return; }
      var page = btn.dataset.page;
      if (page) navigate(page);
    });
  });

  // Wire dropdown
  if (menuEl){
    menuEl.querySelectorAll("button[data-page]").forEach(function(btn){
      btn.addEventListener("click", function(){
        navigate(btn.dataset.page);
      });
    });
  }

  // Expose helpers
  try { window.faNavigate = navigate; } catch(e){}
  try { window.navigate = navigate; } catch(e){}
  try { window.faSetActiveByPage = setActiveByPage; } catch(e){}
  try { window.faDetectActive = detectActive; } catch(e){}

  // Keep active tab in sync for hash-routed / SPA navigation
  window.addEventListener("hashchange", function(){ setTimeout(detectActive, 0); }, { passive:true });
  window.addEventListener("popstate",  function(){ setTimeout(detectActive, 0); }, { passive:true });
  try{
    ["pushState","replaceState"].forEach(function(fn){
      var orig = history[fn];
      if (!orig) return;
      history[fn] = function(){
        var r = orig.apply(this, arguments);
        setTimeout(detectActive, 0);
        return r;
      };
    });
  }catch(_){ }

  maybeRedirectLegacyParams();
  detectActive();
  setMenuAria(false);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(detectActive, 0); });
  } else {
    setTimeout(detectActive, 0);
  }
})();

/* ===========================
   2) Pull-to-refresh (unchanged)
   =========================== */
(function(){
  function isEmbedded(){
    try { return window.top !== window; } catch(e){ return true; }
  }

  function scrollTop(){
    var se = document.scrollingElement || document.documentElement || document.body;
    return se ? (se.scrollTop || 0) : 0;
  }

  function headerBottom(){
    var h = document.querySelector(".fa-header");
    if (!h) return 0;
    var r = h.getBoundingClientRect();
    return r ? (r.bottom || r.height || 0) : 0;
  }

  function isInteractiveTarget(el){
    if (!el) return false;
    return !!el.closest("button,a,input,select,textarea,label,[role='button'],[contenteditable='true'],[data-no-ptr]");
  }

  function _isVisible_(el){
    try{
      if (!el) return false;
      var cs = getComputedStyle(el);
      if (cs.display === "none" || cs.visibility === "hidden") return false;
      if (parseFloat(cs.opacity || "1") === 0) return false;
      var r = el.getBoundingClientRect();
      return !!(r && r.width > 0 && r.height > 0);
    }catch(_){ return false; }
  }

  function inModalOrOverlay(el){
    try{
      return !!(el && el.closest && el.closest(
        "[data-no-ptr],[aria-modal='true'],[role='dialog'],[role='alertdialog'],dialog,.modal,.dialog,.overlay"
      ));
    }catch(_){ return false; }
  }

  function isModalOpen(){
    try{
      if (document.body && document.body.classList && document.body.classList.contains("modal-open")) return true;

      // Any visible dialog/modal/overlay element that is positioned above content
      var nodes = document.querySelectorAll("[aria-modal='true'],dialog[open],[role='dialog'],[role='alertdialog'],.modal,.dialog,.overlay");
      for (var i=0; i<nodes.length; i++){
        var n = nodes[i];
        if (!n || (n.classList && n.classList.contains("fa-header"))) continue;
        if (!_isVisible_(n)) continue;
        var cs = getComputedStyle(n);
        if (cs.position === "fixed" || cs.position === "absolute") return true;
      }
    }catch(_){}
    return false;
  }

  var toast;

  function ensureToast(){
    if (toast) return true;
    if (!document.body) return false;
    toast = document.createElement("div");
    toast.id = "fa-ptr";
    toast.innerHTML = '<span class="spin"></span>';
    document.body.appendChild(toast);
    return true;
  }

  function showToast(){
    if (!ensureToast()) return;
    toast.classList.add("show");
  }

  function hideToast(){
    if (!toast) return;
    toast.classList.remove("show");
  }

  function postRefresh(nonce){
    var msg = { type: "FA_REFRESH", nonce: nonce };
    try { window.top.postMessage(msg, "*"); } catch(e){}
    try {
      if (window.parent && window.parent !== window) window.parent.postMessage(msg, "*");
    } catch(e){}
  }

  function hardReloadSelf(){
    try {
      var u = new URL(location.href);
      u.searchParams.set("r", String(Date.now()));
      u.searchParams.set("fresh", "1");
      location.replace(u.toString());
    } catch(e) {
      location.reload();
    }
  }

  function requestRefresh(){
    var nonce = Date.now();
    var didUnload = false;
    window.addEventListener("beforeunload", function(){ didUnload = true; }, { once:true });

    if (isEmbedded()) postRefresh(nonce);
    else hardReloadSelf();

    setTimeout(function(){
      if (!didUnload) hardReloadSelf();
    }, 350);
  }

  var startY = 0, startX = 0, lastDy = 0;
  var armed = false;

  // Make accidental refreshes harder, but still easy enough when intentional
  var THRESH = 120;   // was 90
  var SHOW_AT = 18;   // was 12
  var MAX_SLOP_X = 80;
  var VERTICAL_RATIO = 2.0;

  window.addEventListener("touchstart", function(e){
    if (!e.touches || e.touches.length !== 1) { armed = false; return; }

    // Only arm when the MAIN page is truly at the top
    if (scrollTop() > 0) { armed = false; return; }

    // Never arm while a modal/overlay is open (prevents modal-top bounce triggering refresh)
    if (isModalOpen() || inModalOrOverlay(e.target)) { armed = false; return; }

    // Never arm on buttons/inputs/explicit no-ptr zones
    if (isInteractiveTarget(e.target)) { armed = false; return; }

    var t = e.touches[0];
    startY = t.clientY;
    startX = t.clientX;
    lastDy = 0;

    // Allow pull-to-refresh starting anywhere below the sticky header
    armed = (startY >= (headerBottom() + 6));
  }, { passive:true });

  window.addEventListener("touchmove", function(e){
    if (!armed || !e.touches || e.touches.length !== 1) return;

    var t = e.touches[0];
    var dy = t.clientY - startY;
    var dx = t.clientX - startX;

    if (dy <= 0){
      lastDy = 0;
      hideToast();
      return;
    }

    var adx = Math.abs(dx);
    if (adx > MAX_SLOP_X || dy < adx * VERTICAL_RATIO){
      lastDy = 0;
      hideToast();
      return;
    }

    if (dy > SHOW_AT){
      lastDy = dy;
      showToast();
    }
  }, { passive:true });

  window.addEventListener("touchend", function(){
    if (!armed){ hideToast(); return; }

    if (lastDy >= THRESH){
      showToast();
      setTimeout(requestRefresh, 60);
    } else {
      hideToast();
    }

    armed = false;
    lastDy = 0;
  }, { passive:true });

  window.addEventListener("touchcancel", function(){
    armed = false;
    lastDy = 0;
    hideToast();
  }, { passive:true });
})();
</script>

<script>
/* =========================
   google.script.run → fetch() bridge (Native Fetch Polyfill)
   - Set window.GAS_API_URL once (or store FA_GAS_API_URL in localStorage)
   ========================= */
(function(){
  const GAS_API_URL = window.GAS_API_URL || localStorage.getItem("FA_GAS_API_URL") || "https://script.google.com/macros/s/AKfycbxlyif58qdt0l90lSvHOm0TxlPffdfMqajwzhGDQlddsNNn82Bg37CGoMpjBKBuZoNK/exec";
  window.GAS_API_URL = GAS_API_URL;

  function createProxy(s, f){
    return new Proxy({}, {
      get: (t, prop) => {
        if (prop === 'withSuccessHandler') return (cb) => createProxy(cb, f);
        if (prop === 'withFailureHandler') return (cb) => createProxy(s, cb);
        return (...args) => fetch(GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: prop, args: args })
        })
        .then(r => r.text()).then(t => { 
          if (!t) throw new Error("Empty response from GAS. Check FA_GAS_API_URL + deployment access.");
          try { return JSON.parse(t); } catch(e){ console.error("Non-JSON response:", t.slice(0,300)); throw e; }
        })
        .then(d => { if (d && d.ok && s) s(d.result); else if (d && d.ok === false && f) f(d); })
        .catch(e => { if (f) f(e); });
      }
    });
  }

  window.google = window.google || {};
  window.google.script = window.google.script || {};
  if (!window.google.script.run){
    window.google.script.run = new Proxy({}, { get: (t, prop) => createProxy(null, null)[prop] });
  }
})();
</script>

<script>
/* ===== Big dialog helpers ===== */
/* ===== Rank tiers (single source of truth) =====
   Server-side rerank writes A/B/C/D into the Players sheet.
   Rankings page colors should match those same thresholds.
   Default here is a safe fallback; it is overwritten from Code.gs (getAcesRankTiers) when available.
*/
let RANK_TIERS = { A: 75, B: 40, C: 25 };

/** Map Rank letters (A/B/C/D) to the existing left-bar color classes. */
function rankTierToShade(rank){
  rank = String(rank||"").trim().toUpperCase();
  if (rank === "A") return "q-top";    // green
  if (rank === "B") return "q-high";   // blue
  if (rank === "C") return "q-mid";    // yellow
  if (rank === "D") return "q-bottom"; // red
  return "q-bottom";
}


function totalToTier(total){
  // Uses current thresholds in RANK_TIERS (values in 0..100).
  total = Number(total);
  if (!isFinite(total)) return "D";
  const A = (RANK_TIERS && isFinite(RANK_TIERS.A)) ? Number(RANK_TIERS.A) : 75;
  const B = (RANK_TIERS && isFinite(RANK_TIERS.B)) ? Number(RANK_TIERS.B) : 40;
  const C = (RANK_TIERS && isFinite(RANK_TIERS.C)) ? Number(RANK_TIERS.C) : 25;
  if (total >= A) return "A";
  if (total >= B) return "B";
  if (total >= C) return "C";
  return "D";
}

function _normalizeTiers_(t){
  if (!t || typeof t !== "object") return null;
  const A = Number(t.A), B = Number(t.B), C = Number(t.C);
  if (![A,B,C].every(Number.isFinite)) return null;
  if (!(A >= B && B >= C)) return null;
  return { A, B, C };
}

function fetchRankTiers_(){
  return new Promise((resolve) => {
    try{
      if (!google || !google.script || !google.script.run || typeof google.script.run.getAcesRankTiers !== "function"){
        return resolve(RANK_TIERS);
      }
      google.script.run
        .withSuccessHandler((t) => {
          const nt = _normalizeTiers_(t);
          if (nt) RANK_TIERS = nt;
          if (processedData && processedData.length) renderTable();
          resolve(RANK_TIERS);
        })
        .withFailureHandler(() => resolve(RANK_TIERS))
        .getAcesRankTiers();
    } catch (e){
      resolve(RANK_TIERS);
    }
  });
}

function openBigDialog(){
  const overlay = document.createElement("div");
  overlay.id = "overlay_big_dialog";
  // If the Cloudflare wrapper is handling scrolling (iframe is tall), a fixed overlay can appear off-screen.
  // We position the overlay relative to the wrapper scroll instead.
  const qs = new URLSearchParams(location.search||"");
  const embedded = qs.get("embed") === "1";
  const ps = (embedded && typeof window.__FA_PARENT_SCALE === "number" && window.__FA_PARENT_SCALE>0) ? window.__FA_PARENT_SCALE : 1;
  const py = (embedded && typeof window.__FA_PARENT_SCROLL_Y === "number") ? window.__FA_PARENT_SCROLL_Y : 0;
  const pvh = (embedded && typeof window.__FA_PARENT_VH === "number" && window.__FA_PARENT_VH>0) ? window.__FA_PARENT_VH : window.innerHeight;
  if (embedded) {
    overlay.style.position = "absolute";
    overlay.style.left = "0";
    overlay.style.right = "0";
    overlay.style.top = Math.max(0, Math.floor(py / ps)) + "px";
    overlay.style.height = Math.max(320, Math.floor(pvh / ps)) + "px";
  } else {
    overlay.style.position = "fixed";
    overlay.style.inset = "0";
  }
  overlay.style.background = "rgba(0,0,0,0.6)";
  overlay.style.display = "flex"; overlay.style.alignItems = "center";
  overlay.style.justifyContent = "center"; overlay.style.zIndex = "9999";
  overlay.style.backdropFilter = "blur(2px)";

  const box = document.createElement("div");
  box.style.width = "96vw"; box.style.maxWidth = "700px";
  // Keep the dialog box within the *visible* portion of the scaled view when embedded.
  if (embedded) {
    box.style.maxHeight = Math.max(240, Math.floor((pvh / ps) * 0.82)) + "px";
  } else {
    box.style.maxHeight = "80vh";
  }

  box.style.overflow = "auto"; box.style.borderRadius = "20px"; box.style.background = "#fff";
  box.style.padding = "28px"; box.style.boxShadow = "0 12px 40px rgba(0,0,0,0.35)";
  box.style.fontSize = "1.8em";
  box.style.touchAction = "manipulation";
  box.style.transform = "scale(0.98)";
  box.style.transition = "transform 120ms ease-out";
  requestAnimationFrame(()=>{box.style.transform="scale(1)"});

  const close = ()=> overlay.remove();
  overlay.addEventListener("click", e=>{ if(e.target===overlay) close(); }, {passive:true});
  document.addEventListener("keydown", function esc(e){
    if(e.key==="Escape"){ close(); document.removeEventListener("keydown", esc); }
  });

  box.setAttribute("role","dialog"); box.setAttribute("aria-modal","true");
  overlay.appendChild(box); document.body.appendChild(overlay);
  try { if (embedded) parent.postMessage({type:"FA_LOCK_SCROLL", lock:true}, "*"); } catch(e){}
  return { overlay, box, close };
}

/* =========================
   Player result modal (same behavior as Stats page)
   - Click any player name to open a match-history modal
   ========================= */

const FA_ACES_TEAM = (window.FA_ACES_TEAM || "Flying Aces").trim();

function $(id){ return document.getElementById(id); }
function esc(s){
  return String(s==null?"":s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function _key(s){ return String(s||"").trim().toLowerCase(); }
function dispTeamName(s){ return (s||"").toString().replace(/^OPP\s*-\s*/i,"").trim(); }

function gsRun(fn /*, ...args */){
  const args = Array.prototype.slice.call(arguments, 1);
  return new Promise((resolve, reject) => {
    try{
      const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
      runner[fn].apply(runner, args);
    }catch(e){ reject(e); }
  });
}

/* ---------------- League Match Index (for instant player modals) ---------------- */
let FA_MATCH_INDEX = null;
let FA_MATCH_INDEX_LOADED_AT = 0;
let FA_MATCH_INDEX_INFLIGHT = null;

let FA_MATCH_PLAYERS_BY_ID = Object.create(null);     // id -> {id,name,team,rank,...}
let FA_MATCH_ID_BY_NAME_TEAM = Object.create(null);   // "name|team" -> id
let FA_MATCHES_BY_ID = Object.create(null);           // id -> [match,...] (chronological)

function _nameTeamKey_(name, team){
  return _key(name||"") + "|" + _key(team||"");
}
function _invertRes_(res){
  res = String(res||"").toUpperCase();
  if (res === "W") return "L";
  if (res === "L") return "W";
  return res; // T or blank
}

function loadLeagueMatchIndex(cb, force){
  cb = cb || function(){};
  const TTL = 5 * 60 * 1000; // 5 minutes
  const now = Date.now();

  if (!force && FA_MATCH_INDEX && (now - FA_MATCH_INDEX_LOADED_AT) < TTL){
    cb(FA_MATCH_INDEX);
    return;
  }

  if (FA_MATCH_INDEX_INFLIGHT){
    FA_MATCH_INDEX_INFLIGHT.then(()=>cb(FA_MATCH_INDEX)).catch(()=>cb(null));
    return;
  }

  FA_MATCH_INDEX_INFLIGHT = gsRun("faGetLeagueMatchIndex_v2", {});
  FA_MATCH_INDEX_INFLIGHT.then(idx => {
    FA_MATCH_INDEX_INFLIGHT = null;

    if (typeof idx === "string") { try{ idx = JSON.parse(idx); }catch(_){ } }
    if (!idx || idx.ok === false) { FA_MATCH_INDEX = null; cb(null); return; }

    FA_MATCH_INDEX = idx;
    FA_MATCH_INDEX_LOADED_AT = Date.now();

    // players map + name/team resolver
    FA_MATCH_PLAYERS_BY_ID = Object.create(null);
    FA_MATCH_ID_BY_NAME_TEAM = Object.create(null);
    (idx.players || []).forEach(p => {
      if (!p || !p.id) return;
      const id = String(p.id);
      FA_MATCH_PLAYERS_BY_ID[id] = p;
      const k = _nameTeamKey_(p.name, p.team);
      if (k && !FA_MATCH_ID_BY_NAME_TEAM[k]) FA_MATCH_ID_BY_NAME_TEAM[k] = id;
    });

    // matches by id (chronological as stored)
    FA_MATCHES_BY_ID = Object.create(null);
    (idx.matches || []).forEach(m => {
      if (!m) return;

      // Resolve IDs if missing, using names + team
      const teamA = m.teamA || "";
      const teamB = m.teamB || "";

      const aIds = (m.aIds || []).slice(0,3);
      const bIds = (m.bIds || []).slice(0,3);
      const aNames = (m.aNames || []).slice(0,3);
      const bNames = (m.bNames || []).slice(0,3);

      const resolvedA = [0,1,2].map(i => {
        const raw = String(aIds[i] || "").trim();
        if (raw) return raw;
        const nm = String(aNames[i] || "").trim();
        if (!nm) return "";
        return FA_MATCH_ID_BY_NAME_TEAM[_nameTeamKey_(nm, teamA)] || "";
      });

      const resolvedB = [0,1,2].map(i => {
        const raw = String(bIds[i] || "").trim();
        if (raw) return raw;
        const nm = String(bNames[i] || "").trim();
        if (!nm) return "";
        return FA_MATCH_ID_BY_NAME_TEAM[_nameTeamKey_(nm, teamB)] || "";
      });

      // Store back resolved ids so later adapt is simpler
      m._aIds = resolvedA;
      m._bIds = resolvedB;

      const ids = resolvedA.concat(resolvedB).filter(Boolean);
      ids.forEach(id => {
        (FA_MATCHES_BY_ID[id] = FA_MATCHES_BY_ID[id] || []).push(m);
      });
    });

    cb(FA_MATCH_INDEX);
  }).catch(err => {
    console.error(err);
    FA_MATCH_INDEX_INFLIGHT = null;
    FA_MATCH_INDEX = null;
    cb(null);
  });
}

function _adaptIndexMatchToCard_(m, focalId){
  if (!m) return null;

  const aIds = (m._aIds || m.aIds || []).slice(0,3);
  const bIds = (m._bIds || m.bIds || []).slice(0,3);

  const inA = aIds.indexOf(focalId) >= 0;
  const inB = bIds.indexOf(focalId) >= 0;

  // Default: show from teamA perspective
  let leftTeam = m.teamA || "";
  let rightTeam = m.teamB || "";
  let leftIds = aIds;
  let rightIds = bIds;
  let res = String(m.result || "").toUpperCase();

  // If the player is on teamB, flip so player is always on the left
  if (!inA && inB){
    leftTeam = m.teamB || "";
    rightTeam = m.teamA || "";
    leftIds = bIds;
    rightIds = aIds;
    res = _invertRes_(res);
  }

  const r = {
    ts: m.ts || m.date || "",
    mode: m.mode || "",
    result: res,
    scoreMode: m.scoreMode || "",
    leftTeam: leftTeam,
    rightTeam: rightTeam
  };

  function fillSide(prefix, ids){
    for (let i=0; i<3; i++){
      const id = String(ids[i] || "").trim();
      const p = id ? (FA_MATCH_PLAYERS_BY_ID[id] || null) : null;
      r[prefix + (i+1)] = p ? (p.name || "") : "";
      r[prefix + (i+1) + "Id"] = id;
      r[prefix + (i+1) + "Rank"] = p ? (p.rank || "") : "";
    }
  }

  fillSide("a", leftIds);
  fillSide("o", rightIds);

  // Score parsing (match index encodes score as "A-B" OR "5 & 4")
  const sc = String(m.score || "").trim();
  const mm = sc.match(/^\s*(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)\s*$/);
  if (mm){
    let sL = mm[1], sR = mm[2];
    // if flipped, swap numeric scores
    if (!inA && inB){ const tmp = sL; sL = sR; sR = tmp; }
    r.acesScore = sL;
    r.oppScore = sR;
  } else {
    r.mpScore = sc;
  }

  return r;
}

/* ---------- match card renderer (lite, matches Stats styling) ---------- */
function _rankClass_(raw){
  raw = String(raw||"").trim().toUpperCase();
  if (raw === "A" || raw === "AF") return "rank-A";
  if (raw === "B" || raw === "BF") return "rank-B";
  if (raw === "C" || raw === "CF") return "rank-C";
  if (raw === "D") return "rank-D";
  return "";
}
function _rankPillWithSide_(rankVal, isLeft){
  const raw = String(rankVal||"").trim().toUpperCase();
  if (!raw) return "";
  const cls = _rankClass_(raw);
  const side = isLeft ? "rank-left" : "rank-right";
  return `<span class="rank-pill ${cls} ${side}">${esc(raw)}</span>`;
}

function prettyDate(ts){
  if (!ts) return "";
  try{
    let d = null;
    if (ts instanceof Date) d = ts;
    else if (typeof ts === "number") d = new Date(ts);
    else if (typeof ts === "string"){
      const s = ts.trim();
      // YYYY-MM-DD
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
      else d = new Date(s);
    }
    if (!d || !isFinite(d.getTime())) return String(ts||"").trim();
    return d.toLocaleDateString("en-US", { month:"numeric", day:"numeric", year:"2-digit" });
  }catch(_){ return String(ts||"").trim(); }
}

function _buildMatchCardHtmlLite(r){
  const mode = String(r.mode||"").toLowerCase();
  const resRaw = String(r.result||"").trim().toUpperCase();

  const leftTeam  = dispTeamName(r.leftTeam  || r.teamA || "");
  const rightTeam = dispTeamName(r.rightTeam || r.teamB || "");

  const cls = (resRaw === "W" || resRaw === "WIN") ? "score-win"
            : (resRaw === "L" || resRaw === "LOSS") ? "score-loss"
            : "score-tie";

  // players
  const left = [
    { n:r.a1, rr:r.a1Rank, id:r.a1Id },
    { n:r.a2, rr:r.a2Rank, id:r.a2Id },
    { n:r.a3, rr:r.a3Rank, id:r.a3Id }
  ].filter(x => x.n);

  const right = [
    { n:r.o1, rr:r.o1Rank, id:r.o1Id },
    { n:r.o2, rr:r.o2Rank, id:r.o2Id },
    { n:r.o3, rr:r.o3Rank, id:r.o3Id }
  ].filter(x => x.n);

  function personBlock(x, isLeft){
    const nm = String(x.n||"").trim();
    const tm = isLeft ? leftTeam : rightTeam;
    const linked = playerLinkHTML(nm, tm);
    const rb = _rankPillWithSide_(x.rr, isLeft);
    return `
      <div class="mc-person">
        <div class="mc-person-name">${linked || esc(nm)}</div>
        <div class="mc-person-pills">${rb}</div>
      </div>
    `;
  }

  const leftHtml  = (leftTeam ? `<div class="mc-side-team">${esc(leftTeam)}</div>` : "") + left.map(x => personBlock(x, true)).join("");
  const rightHtml = (rightTeam ? `<div class="mc-side-team">${esc(rightTeam)}</div>` : "") + right.map(x => personBlock(x, false)).join("");

  // score
  const aScore = (r.acesScore==null ? "" : String(r.acesScore)).trim();
  const oScore = (r.oppScore==null  ? "" : String(r.oppScore )).trim();

  const hasStrokePair = (aScore !== "" && oScore !== "");
  const isStroke = (mode === "doubles") || (mode === "triples") || (String(r.scoreMode||"").toLowerCase() === "stroke") || hasStrokePair;

  const mp = String(r.mpScore || aScore || oScore || "").trim();

  const scoreHtml = isStroke
    ? `<div class="mc-score mc-score-stroke ${cls}">
         <span>${esc(aScore)}</span>
         <span style="opacity:.5;">–</span>
         <span>${esc(oScore)}</span>
       </div>`
    : `<div class="mc-score mc-score-mp ${cls}">${esc(mp || "—")}</div>`;

  const dateStr = prettyDate(r.ts || r.date || "");
  const dateHtml = dateStr ? `<div class="mc-date">${esc(dateStr)}</div>` : "";

  return `
    <div class="match-card ${cls}">
      <div class="mc-left">${leftHtml}</div>
      <div class="mc-mid">${dateHtml}${scoreHtml}</div>
      <div class="mc-right">${rightHtml}</div>

  `;
}

function openPlayerModalByName(name, team){

  name = String(name||"").trim();
  team = String(team||"").trim() || FA_ACES_TEAM;

  loadLeagueMatchIndex(() => {

    if (pid){
      renderPlayerModalFromIndex(pid, name, team);
      return;

    // fallback: server resolver
    gsRun("faResolvePlayerIdByName_v2", name, team).then(res => {
      if (res && typeof res === "string") { try{ res = JSON.parse(res); }catch(_){ } }
      pid = (res && (res.id || res.playerId)) ? String(res.id || res.playerId) : "";

function renderPlayerModalFromIndex(pid, name, team){
  pid = String(pid||"").trim();
  const body = $("pmBody");
  const meta = $("pmMeta");

  if (!pid){
    if (body) body.innerHTML = '<div class="muted" style="font-weight:900;">No matches found.</div>';
    return;
  }

  // Update title from canonical player entry when possible
  try{
    const p = FA_MATCH_PLAYERS_BY_ID && FA_MATCH_PLAYERS_BY_ID[pid];
    if (p && $("pmTitle")){
      $("pmTitle").textContent = (p.name || name || "Player") + ((p.team || team) ? " • " + (p.team || team) : "");
    }
  }catch(_){}

  const ms = (FA_MATCHES_BY_ID && FA_MATCHES_BY_ID[pid]) ? FA_MATCHES_BY_ID[pid].slice() : [];
  if (!ms.length){
    if (meta) meta.textContent = "0 matches";
    if (body) body.innerHTML = '<div class="muted" style="font-weight:900;">No matches found.</div>';
    return;
  }

  // Most recent first (match index is chronological)
  ms.reverse();

  const cards = ms.map(m => _adaptIndexMatchToCard_(m, pid)).filter(Boolean);

  if (meta) meta.textContent = `${cards.length} match${cards.length===1?"":"es"}`;
  if (body) body.innerHTML = '<div id="pmCards"></div>';
  renderMatchCardsLite("pmCards", cards);
}

let currentSortKey = 'total';

// Used to avoid auto-sync re-render "flashing" while the user is actively changing weights
let __rankingsLastInteractionMs = 0;

const CACHE_KEY = 'fa_rankings_pack_v2';
const CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours (SWR: cache is used even if stale)
// Cross-device sync (Rankings)
let __rankingsV = String(localStorage.getItem('fa_rankings_v') || '');
let __rankingsAutoSyncTimer = null;
let __rankingsSyncBusy = false;

// ✅ Robust init: don't rely on window.onload (Header include can overwrite it)
let __rankingsInited = false;
function initRankingsPage(){
  if (__rankingsInited) return;
  __rankingsInited = true;

  try { populateDropdownsFast(); } catch(e){ console.error(e); }

  // 1) Instant paint from cache (SWR)
  try {
    const pack = loadCachedPack();
    if (pack && pack.v) {
      __rankingsV = String(__rankingsV || pack.v || '');
      try { localStorage.setItem('fa_rankings_v', __rankingsV); } catch(_){}
    }
    const cached = pack && Array.isArray(pack.rows) ? pack.rows : null;
    if (cached && cached.length){
      // Let the header/UI paint first, then render cached table.
      requestAnimationFrame(() => {
        try { initData(cached, true); } catch(e){ console.error(e); }
      });
    }
  } catch(e){ console.error(e); }

  // Start auto-sync immediately (it will no-op until __rankingsV is known)
  try { startAutoSyncRankings(); } catch(e){ console.error(e); }

  // 2) Revalidate in background (tiers + live rows)
  setTimeout(() => {
    try { fetchRankTiers_(); } catch(e){ console.error(e); }
    try { fetchLatestRankingsAndRefresh(); } catch(e){ console.error(e); }
  }, 0);
}

function loadCachedPack(){
  try {
    const s = sessionStorage.getItem(CACHE_KEY) || localStorage.getItem(CACHE_KEY);
    if (!s) return null;
    const obj = JSON.parse(s);

    // Legacy: old cache was stored as just an array of rows; treat as expired.
    if (Array.isArray(obj)) return null;

    if (!obj || !Array.isArray(obj.rows)) return null;

    const ts = Number(obj.ts || 0);
    // SWR: even if stale, we still render instantly and revalidate in background.
    return {
      v: (obj.v != null) ? String(obj.v) : '',
      ts: ts || 0,
      rows: obj.rows
    };
  } catch(e){ return null; }
}

function saveCachedPack(v, rows){
  try{
    const pack = { v: String(v || ''), ts: Date.now(), rows: rows };
    try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(pack)); } catch(e){}
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(pack)); } catch(e){}
  } catch(e){}
}

// Convenience wrappers used by the rest of the page
function loadCachedRaw(){
  const pack = loadCachedPack();
  return pack ? pack.rows : null;
}
function saveCachedRaw(rows){
  const v = __rankingsV || String(localStorage.getItem('fa_rankings_v') || '');
  saveCachedPack(v, rows);
}

function getStoredWeight(key, fallback){
  const v = parseFloat(localStorage.getItem(key));
  return Number.isFinite(v) ? v : fallback;
}

function fetchLatestRankingsAndRefresh(done){
  if (typeof google === 'undefined') { if (done) done(); return; }

  google.script.run
    .withSuccessHandler(function(payload){
      // Backwards compatible: payload may be rows array (older server)
      var rows = (payload && payload.rows) ? payload.rows : payload;
      if (!Array.isArray(rows)) { if (done) done(); return; }

      // Track server version (used for cross-device sync)
      try{
        if (payload && payload.v != null) {
          __rankingsV = String(payload.v);
          localStorage.setItem('fa_rankings_v', __rankingsV);
        }
      }catch(_){}

      // Keep tier colors in sync (optional)
      try{
        var t = (payload && payload.tiers) ? _normalizeTiers_(payload.tiers) : null;
        if (t) RANK_TIERS = t;
      }catch(_){}

      // accept 6 cols (A:F)
      const normalized = rows.map(r => [r[0], r[1], r[2], r[3], r[4], r[5]]);

      // Save a versioned+timestamped cache so we don't show very old data on a later visit,
      // and so updates always overwrite reliably.
      saveCachedPack(__rankingsV, normalized);

      initData(normalized, false);

      // start polling after first live fetch
      startAutoSyncRankings();

      if (done) done();
    })
    .withFailureHandler(function(err){
      const msg = (err && err.message) ? err.message : String(err || "Unknown error");
      showPopup("Error", msg, "#dc3545");
      if (done) done();
    })
    .getRankingsPayload();
}


function startAutoSyncRankings(){
  if (__rankingsAutoSyncTimer) return;
  __rankingsAutoSyncTimer = setInterval(() => {
    if (__rankingsSyncBusy) return;
    if (!__rankingsV) return;

    // Don't disrupt open dialogs / active loading
    try{
      if (document.getElementById('overlay_big_dialog')) return;
      const lo = document.getElementById('loadingOverlay');
      if (lo && lo.style && lo.style.display && lo.style.display !== 'none') return;
    }catch(_){}

    __rankingsSyncBusy = true;
    google.script.run
      .withSuccessHandler((payload) => {
        __rankingsSyncBusy = false;
        if (!payload) return;

        const rows = payload.rows || payload;
        if (!Array.isArray(rows)) return;

        try{
          if (payload.v != null) {
            __rankingsV = String(payload.v);
            localStorage.setItem('fa_rankings_v', __rankingsV);
          }
        }catch(_){}

        try{
          const t = payload.tiers ? _normalizeTiers_(payload.tiers) : null;
          if (t) RANK_TIERS = t;
        }catch(_){}

        const normalized = rows.map(r => [r[0], r[1], r[2], r[3], r[4], r[5]]);
        saveCachedPack(__rankingsV, normalized);

        // Avoid UI "flashes" if data arrives while the user is actively changing weights
        if (Date.now() - (__rankingsLastInteractionMs || 0) < 1500) return;
        initData(normalized, false);
      })
      .withFailureHandler((err) => {
        __rankingsSyncBusy = false;
        console.warn("Rankings auto-sync failed", err);
      })
      .getRankingsDataIfNewer(__rankingsV);
  }, 8000);
}


function initData(data, fromCache) {
  // Women (AF/BF/CF ranks) are intentionally excluded from the Rankings table + rerank math.
  rawData = data
    .filter(r => {
      const baseRank = String(r[5] || "").trim().toUpperCase();
      return !/^(A|B|C)\-?F$/i.test(baseRank);
    })
    .map(r => ({
      name: r[0],
      tier: String(r[5] || "").trim().toUpperCase(),
      pdga: parseFloat(r[1]) || 0,
      league: parseFloat(r[2]) || 0,
      capt: parseFloat(r[3]) || 0,
      tc: parseFloat(r[4]) || 0
    }));

  const wC = getStoredWeight('w-capt', DEFAULT_WEIGHTS.capt);
  const wP = getStoredWeight('w-pdga', DEFAULT_WEIGHTS.pdga);
  const wL = getStoredWeight('w-league', DEFAULT_WEIGHTS.league);
  const wT = getStoredWeight('w-tc', DEFAULT_WEIGHTS.tc);

  document.getElementById('w-capt').value = wC;
  document.getElementById('w-pdga').value = wP;
  document.getElementById('w-league').value = wL;
  document.getElementById('w-tc').value = wT;

  if (!fromCache) { currentSortKey = 'total'; sortDirection = -1; }
  calculateRankings();
}

/* ===== Mean-preserving TOTAL (matches Rerank.gs) ===== */
function _faErf_(x){
  const sign = (x >= 0) ? 1 : -1;
  x = Math.abs(x);

  const a1 = 0.254829592;
  const a2 = -0.284496736;
  const a3 = 1.421413741;
  const a4 = -1.453152027;
  const a5 = 1.061405429;
  const p  = 0.3275911;

  const t = 1.0 / (1.0 + p * x);
  const y = 1.0 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t * Math.exp(-x*x);

  return sign * y;
}
function _faNormCdf_(z){
  return 0.5 * (1 + _faErf_(z / Math.sqrt(2)));
}
function _faMean_(arr){
  const n = arr.length;
  if (!n) return 0;
  let s = 0;
  for (let i=0;i<n;i++) s += arr[i];
  return s / n;
}
function _faStdevP_(arr, mu){
  const n = arr.length;
  if (!n) return 0;
  let ss = 0;
  for (let i=0;i<n;i++){
    const d = arr[i] - mu;
    ss += d*d;
  }
  return Math.sqrt(ss / n);
}


function calculateRankings() {
  __rankingsLastInteractionMs = Date.now();
  const vC = parseFloat(document.getElementById('w-capt').value) || 0;
  const vP = parseFloat(document.getElementById('w-pdga').value) || 0;
  const vL = parseFloat(document.getElementById('w-league').value) || 0;
  const vT = parseFloat(document.getElementById('w-tc').value) || 0;

  localStorage.setItem('w-capt', vC);
  localStorage.setItem('w-pdga', vP);
  localStorage.setItem('w-league', vL);
  localStorage.setItem('w-tc', vT);

  document.getElementById('total-warning').style.display =
    ((vC + vP + vL + vT) !== 100) ? 'block' : 'none';

  // weights as 0..1
  const wC = vC / 100;
  const wP = vP / 100;
  const wL = vL / 100;
  const wT = vT / 100;

  // Build arrays for means / stdevs (population), using tc in 0..1
  const pdgas = new Array(rawData.length);
  const leagues = new Array(rawData.length);
  const capts = new Array(rawData.length);
  const tcs = new Array(rawData.length);

  for (let i=0; i<rawData.length; i++){
    const p = rawData[i];
    pdgas[i] = Number(p.pdga) || 0;
    leagues[i] = Number(p.league) || 0;
    capts[i] = Number(p.capt) || 0;

    const tcRaw = Number(p.tc) || 0;
    tcs[i] = (tcRaw > 1) ? (tcRaw / 100) : tcRaw; // 75 => 0.75
  }

  const muPdga = _faMean_(pdgas),     sdPdga = _faStdevP_(pdgas, muPdga);
  const muLeague = _faMean_(leagues), sdLeague = _faStdevP_(leagues, muLeague);
  const muCapt = _faMean_(capts),     sdCapt = _faStdevP_(capts, muCapt);
  const muTc = _faMean_(tcs),         sdTc = _faStdevP_(tcs, muTc);

  const z = (x, mu, sd) => (sd > 0 ? (x - mu) / sd : 0);

  // Composite s = weighted z-scores (mean-preserving):
  // PDGA, TC higher better ( +z )
  // League, Captain lower better ( -z )
  const sVals = new Array(rawData.length);
  processedData = new Array(rawData.length);

  for (let i=0; i<rawData.length; i++){
    const p = rawData[i];

    const pdga = pdgas[i];
    const league = leagues[i];
    const capt = capts[i];
    const tc01 = tcs[i];

    const zPdga = z(pdga, muPdga, sdPdga);
    const zLeague = z(league, muLeague, sdLeague);
    const zCapt = z(capt, muCapt, sdCapt);
    const zTc = z(tc01, muTc, sdTc);

    const s = (-zCapt) * wC + (-zLeague) * wL + (zPdga) * wP + (zTc) * wT;
    sVals[i] = s;

    processedData[i] = {
      ...p,
      _tc01: tc01,
      _s: s
    };
  }

  const muS = _faMean_(sVals);
  const sdS = _faStdevP_(sVals, muS);

  for (let i=0; i<processedData.length; i++){
    const p = processedData[i];
    const scoreZ = (sdS > 0) ? ((p._s - muS) / sdS) : 0;

    // Percentile-like TOTAL in 0..100 (NOT forced so top=100)
    let total = _faNormCdf_(scoreZ) * 100;
    if (total < 0) total = 0;
    if (total > 100) total = 100;

    p.total = Math.round(total);
    p.previewTier = totalToTier(p.total);
    p._scoreZ = scoreZ;
  }

  processedData.sort((a,b)=> (b.total - a.total) || a.name.localeCompare(b.name));
  for (let i=0; i<processedData.length; i++) processedData[i].rank = i + 1;

  if (currentSortKey && currentSortKey !== 'total') sortTable(currentSortKey, true);
  else renderTable();
}

const DEFAULT_SORT_DIR = { rank:1, name:1, capt:1, league:1, pdga:-1, tc:-1, total:-1 };

function sortTable(key, silent){
  if (!silent) {
    if (currentSortKey === key) sortDirection *= -1;
    else { currentSortKey = key; sortDirection = DEFAULT_SORT_DIR[key] ?? -1; }
  }

  processedData.sort((a, b) => {
    let vA = a[key], vB = b[key];
    if (vA === vB) return (a.rank - b.rank);

    if (key === 'name') {
      return (sortDirection === 1)
        ? String(vA).localeCompare(String(vB))
        : String(vB).localeCompare(String(vA));
    }

    vA = Number(vA); vB = Number(vB);
    const aNaN = Number.isNaN(vA), bNaN = Number.isNaN(vB);
    if (aNaN && bNaN) return (a.rank - b.rank);
    if (aNaN) return 1;
    if (bNaN) return -1;

    return (sortDirection === 1) ? (vA - vB) : (vB - vA);
  });

  renderTable();
}

function renderTable(){
  let html = '';
  for (let i=0; i<processedData.length; i++){
    const p = processedData[i];
    const shade = rankTierToShade(p.previewTier || p.tier);
    const tcPct = (p.tc <= 1 ? p.tc * 100 : p.tc);

    html += `
      <tr class="${shade}">
        <td class="rank-cell">${p.rank}</td>
        <td class="player-name"><a class="playerLink" href="#" data-name="${esc(p.name)}" data-team="${esc(FA_ACES_TEAM)}">${esc(p.name)}</a></td>
        <td>${p.capt}</td>
        <td>${(Number(p.pdga) > 0 ? p.pdga : '—')}</td>
        <td>${p.league}</td>
        <td>${tcPct.toFixed(0)}%</td>
        <td class="score-cell">${p.total}</td>
      </tr>`;
  }
  document.getElementById('table-body').innerHTML = html;
}

      setLoading(false);
      const msg = (err && err.message) ? err.message : String(err || "Unknown error");
      showPopup("Error", msg, "#dc3545");
    })
    .applyAcesRankingsToMatchups({ capt:w.capt, pdga:w.pdga, league:w.league, tc:w.tc, tiers:RANK_TIERS });
}

/* RESET menu: reset actions + weight presets */


/* (removed duplicate openResetMenu; combined into openRerankMenu) */


function setWeightsPreset(p){
  if (!p) return;

  document.getElementById('w-capt').value = p.capt;
  document.getElementById('w-pdga').value = p.pdga;
  document.getElementById('w-league').value = p.league;
  document.getElementById('w-tc').value = p.tc;

  localStorage.setItem('w-capt', p.capt);
  localStorage.setItem('w-pdga', p.pdga);
  localStorage.setItem('w-league', p.league);
  localStorage.setItem('w-tc', p.tc);

  calculateRankings();
}

function setDefaultWeights(){
  setWeightsPreset(DEFAULT_WEIGHTS);
}

function runResetDefaults(){
  setLoading(true);
  google.script.run
    .withSuccessHandler(()=>{
      fetchLatestRankingsAndRefresh(()=>{
        setLoading(false);
        showPopup("Success", "Defaults restored (PDGA/Ranks).", "#28a745");
      });
    })
    .withFailureHandler((err)=>{
      setLoading(false);
      const msg = (err && err.message) ? err.message : String(err || "Unknown error");
      showPopup("Error", msg, "#dc3545");
    })
    .resetAcesMatchupsToDefaults();
}
